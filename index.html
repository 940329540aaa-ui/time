<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f1f5f9; --card-bg: #fff; --text: #1e293b; --text-secondary: #64748b;
  --border: #e2e8f0; --primary: #4f46e5; --primary-light: #eef2ff;
  --sidebar-bg: #0f172a; --sidebar-text: #94a3b8; --sidebar-active: #fff;
  --danger: #ef4444; --success: #10b981; --warning: #f59e0b;
  --cat-work: #4f46e5; --cat-sleep: #8b5cf6; --cat-ent: #f59e0b;
  --cat-social: #10b981; --cat-learn: #3b82f6; --cat-exercise: #ef4444;
  --radius: 12px; --shadow: 0 1px 2px rgba(0,0,0,.05), 0 2px 6px rgba(0,0,0,.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08);
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; font-size: 18px; }
.sidebar { width: 240px; background: var(--sidebar-bg); color: #fff; padding: 24px 0; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
.sidebar-logo { padding: 0 20px 24px; font-size: 23px; font-weight: 700; letter-spacing: .5px; border-bottom: 1px solid rgba(255,255,255,.08); margin-bottom: 16px; }
.sidebar-logo span { font-size: 13px; font-weight: 400; opacity: .5; display: block; margin-top: 4px; }
.sidebar-nav { flex: 1; padding: 0 12px; }
.sidebar-nav a { display: flex; align-items: center; gap: 10px; padding: 10px 12px; color: var(--sidebar-text); text-decoration: none; border-radius: 8px; font-size: 16px; margin-bottom: 2px; transition: all .15s; cursor: pointer; }
.sidebar-nav a:hover { background: rgba(255,255,255,.06); color: #e2e8f0; }
.sidebar-nav a.active { background: rgba(255,255,255,.1); color: var(--sidebar-active); font-weight: 600; }
.sidebar-nav a svg { width: 20px; height: 20px; flex-shrink: 0; }
.main { margin-left: 240px; flex: 1; padding: 28px 32px; max-width: calc(100vw - 240px); }
.page { display: none; }
.page.active { display: block; }
h2 { font-size: 26px; margin-bottom: 20px; font-weight: 700; color: var(--text); }

.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--card-bg); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); }
.stat-card .label { font-size: 15px; color: var(--text-secondary); margin-bottom: 6px; }
.stat-card .value { font-size: 33px; font-weight: 700; }
.stat-card .sub { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.chart-card { background: var(--card-bg); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); }
.chart-card.full { grid-column: 1 / -1; }
.chart-card h3 { font-size: 17px; margin-bottom: 16px; color: var(--text); font-weight: 600; }
.chart-wrap { position: relative; height: 300px; }
.chart-wrap.tall { height: 400px; }

table { width: 100%; border-collapse: collapse; font-size: 16px; }
th { text-align: left; padding: 10px 12px; border-bottom: 2px solid var(--border); color: var(--text-secondary); font-weight: 600; font-size: 15px; white-space: nowrap; }
td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
tr:hover td { background: #fafafa; }

.filters { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.filters select, .filters input { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; background: #fff; outline: none; }
.filters select:focus, .filters input:focus { border-color: var(--primary); }
.btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 500; transition: all .2s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { opacity: .9; }
.btn-sm { padding: 4px 10px; font-size: 13px; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-outline { background: #fff; border: 1px solid var(--border); }

.category-tag { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 13px; font-weight: 500; }
.cat-睡眠与休息 { background: #f3e8ff; color: #7c3aed; }
.cat-科研任务 { background: #eef2ff; color: #4f46e5; }
.cat-娱乐 { background: #fef3c7; color: #d97706; }
.cat-生活事务 { background: #d1fae5; color: #059669; }
.cat-兴趣学习 { background: #dbeafe; color: #2563eb; }
.cat-运动 { background: #fee2e2; color: #dc2626; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; display: flex; align-items: center; justify-content: center; }
.modal { background: #fff; border-radius: var(--radius); padding: 24px; width: 440px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
.modal h3 { margin-bottom: 16px; }
.modal .form-group { margin-bottom: 14px; }
.modal label { display: block; font-size: 15px; color: var(--text-secondary); margin-bottom: 4px; font-weight: 500; }
.modal input, .modal select { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; outline: none; }
.modal input:focus, .modal select:focus { border-color: var(--primary); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

.matrix-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 16px; height: calc(100vh - 180px); min-height: 400px; }
.matrix-q { border-radius: var(--radius); padding: 20px; background: #fff; box-shadow: var(--shadow); overflow-y: auto; }
.matrix-q h3 { font-size: 16px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
.matrix-item { padding: 10px 12px; background: #f9fafb; border-radius: 8px; margin-bottom: 8px; font-size: 16px; cursor: pointer; transition: all .2s; }
.matrix-item:hover { background: #f3f4f6; }
.matrix-item .task { font-weight: 600; }
.matrix-item .detail { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
.q-urgent-important { border-top: 4px solid var(--danger); }
.q-noturgent-important { border-top: 4px solid var(--primary); }
.q-urgent-notimportant { border-top: 4px solid var(--warning); }
.q-noturgent-notimportant { border-top: 4px solid #9ca3af; }

.empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
.empty-state svg { width: 64px; height: 64px; opacity: .3; margin-bottom: 16px; }

@media (max-width: 768px) {
  .sidebar { width: 100%; height: auto; position: relative; padding: 8px 10px; flex-direction: row; flex-wrap: wrap; }
  .sidebar-logo { width: 100%; padding: 0 0 8px; border: none; margin: 0; font-size: 18px; }
  .sidebar-logo span { font-size: 12px; }
  .sidebar-nav { display: flex; gap: 2px; padding: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .sidebar-nav a { font-size: 13px; padding: 6px 10px; white-space: nowrap; flex-shrink: 0; }
  .sidebar-nav a svg { width: 16px; height: 16px; }
  .main { margin-left: 0; max-width: 100%; padding: 14px 10px; }
  .charts-row { grid-template-columns: 1fr; }
  .matrix-grid { grid-template-columns: 1fr; height: auto; }
  table { font-size: 14px; }
  th, td { padding: 6px 8px; }
  .filters { flex-direction: column; gap: 8px; }
  .filters select, .filters input { width: 100%; }
  .chart-wrap { height: 230px; }
  .chart-wrap.tall { height: 280px; }
  h2 { font-size: 22px; }
  .btn { font-size: 14px; padding: 6px 12px; }
  .cat-grid-mobile { grid-template-columns: 1fr !important; }
}

@media (max-width: 480px) {
  .stats-row { grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-card { padding: 12px; }
  .stat-card .value { font-size: 24px; }
  .stat-card .label { font-size: 13px; }
  .stat-card .sub { font-size: 12px; }
  .modal { padding: 16px; width: 95vw; }
  .modal input, .modal select { font-size: 15px; }
  .btn { font-size: 13px; padding: 6px 10px; }
  h2 { font-size: 20px; }
  body { font-size: 16px; }
  .chart-wrap { height: 220px; }
  .chart-wrap.tall { height: 260px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #a1a1a1; }
* { scrollbar-width: thin; scrollbar-color: #c1c1c1 transparent; }

/* Mobile horizontal scroll helper */
.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; max-width: 100%; }
.table-scroll table { min-width: 600px; white-space: nowrap; }
</style>
</head>

function cmpDate(a, b) {
  const pa = a.split('.').map(Number), pb = b.split('.').map(Number);
  for (let i = 0; i < 3; i++) { if (pa[i] !== pb[i]) return pa[i] - pb[i]; }
  return 0;
}

const SYNC_CONFIG_KEY = 'lyu_sync_config';
let firestore = null;
let syncUnsub = null;
let syncPaused = false; // prevent feedback loop when updating from remote

function getSyncConfig() {
  try { return JSON.parse(localStorage.getItem(SYNC_CONFIG_KEY) || 'null'); } catch { return null; }
}

function initFirebase(config) {
  if (!firebase.apps.length) firebase.initializeApp(config);
  firestore = firebase.firestore();
  firestore.enablePersistence().catch(function(e) {
    if (e.code === 'failed-precondition') console.warn('Firebase persistence: multiple tabs open');
  });
}

function isSyncReady() { return !!firestore; }

function updateSyncStatus(text, ok) {
  var el = document.getElementById('sync-status');
  if (!el) return;
  el.textContent = text;
  el.style.color = ok ? '#10b981' : '#ef4444';
}

async function syncPush(records, matrix) {
  if (!firestore) return false;
  try {
    await firestore.collection('userData').doc('main').set({
      records: records,
      matrix: matrix || null,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    updateSyncStatus('已同步', true);
    return true;
  } catch (e) {
    updateSyncStatus('同步失败', false);
    return false;
  }
}

function syncListen(onRemoteData) {
  if (syncUnsub) { syncUnsub(); syncUnsub = null; }
  if (!firestore) return;
  syncUnsub = firestore.collection('userData').doc('main')
    .onSnapshot(function(snap) {
      if (!snap.exists) return;
      var data = snap.data();
      if (!data || !data.updatedAt) return;
      if (syncPaused) return;
      onRemoteData(data);
    }, function(err) {
      console.warn('syncListen error:', err);
    });
}

// Resolve all records from embedded data + user overrides (without using sync)
function resolveFromEmbedded() {
  var key = function(r) { return [r.date, r.activity, r.category].join('|'); };
  var merged = new Map();
  for (var m in EMBEDDED_DATA.months) {
    if (!EMBEDDED_DATA.months.hasOwnProperty(m)) continue;
    for (var i = 0; i < EMBEDDED_DATA.months[m].length; i++) {
      var r = EMBEDDED_DATA.months[m][i];
      if (r.date) merged.set(key(r), { date: r.date, location: r.location, activity: r.activity, category: r.category, hours: r.hours });
    }
  }
  var saved = JSON.parse(localStorage.getItem('lyu_records') || '[]');
  var deleted = new Set(), overrides = new Map();
  for (var i = 0; i < saved.length; i++) {
    var r = saved[i];
    if (r._deleted) { deleted.add(r._deleted); continue; }
    if (r._overrides) { overrides.set(r._overrides, r); continue; }
    merged.set(key(r), { date: r.date, location: r.location, activity: r.activity, category: r.category, hours: r.hours });
  }
  for (var entry of overrides) {
    var oldKey = entry[0], r = entry[1];
    var k = key(r);
    if (oldKey !== k) merged.delete(oldKey);
    merged.set(k, { date: r.date, location: r.location, activity: r.activity, category: r.category, hours: r.hours });
  }
  for (var d of deleted) merged.delete(d);
  return [...merged.values()].sort(function(a, b) { return -cmpDate(a.date, b.date); });
}

function afterLocalSave() {
  // After any local data change, re-resolve and push to cloud if sync is active
  if (!isSyncReady()) return;
  var records = resolveFromEmbedded();
  var matrix = JSON.parse(localStorage.getItem('lyu_matrix') || 'null');
  localStorage.setItem('lyu_resolved', JSON.stringify(records));
  syncPush(records, matrix);
}

// Activate sync: upload local data and start listening
function activateSync(config) {
  localStorage.setItem(SYNC_CONFIG_KEY, JSON.stringify(config));
  initFirebase(config);
  var records = resolveFromEmbedded();
  localStorage.setItem('lyu_resolved', JSON.stringify(records));
  var matrix = JSON.parse(localStorage.getItem('lyu_matrix') || 'null');
  syncPush(records, matrix).then(function(ok) {
    if (!ok) {
      alert('同步上传失败。\n\n请确认已在 Firebase 控制台创建了 Firestore 数据库：\n\n1. 打开 https://console.firebase.google.com/project/farank-f5ef6/firestore\n2. 点击"创建数据库"\n3. 选 asia-east2（香港），测试模式\n4. 创建后再刷新本页面，点击"一键开启"\n\n如果已创建仍失败，可能需要开启 VPN/代理。');
      updateSyncStatus('Firestore 未创建', false);
    }
  });
  syncListen(function(data) {
    if (data.records) {
      localStorage.setItem('lyu_resolved', JSON.stringify(data.records));
    }
    if (data.matrix) {
      localStorage.setItem('lyu_matrix', JSON.stringify(data.matrix));
    }
    if (currentPage !== 'settings') destroyCharts();
    renderPage(currentPage);
    updateSyncStatus('已同步', true);
  });
  updateSyncStatus('同步中...', true);
}

function deactivateSync() {
  if (syncUnsub) { syncUnsub(); syncUnsub = null; }
  firestore = null;
  localStorage.removeItem(SYNC_CONFIG_KEY);
  localStorage.removeItem('lyu_resolved');
  updateSyncStatus('云同步未开启', false);
}

// ===== DATA LOADING =====
function getAllRecords() {
  // If sync is configured and we have resolved data, use it directly
  var resolved = JSON.parse(localStorage.getItem('lyu_resolved') || 'null');
  if (getSyncConfig() && resolved && resolved.length > 0) return resolved;
  return resolveFromEmbedded();
}

function getMonthlyRecords() {
  const records = getAllRecords();
  const months = {};
  for (const r of records) {
    const m = r.date.split('.').slice(0, 2).join('.');
    if (!months[m]) months[m] = [];
    months[m].push(r);
  }
  return months;
}

function formatHours(h) {
  const hrs = Math.floor(h);
  const mins = Math.round((h - hrs) * 60);
  return mins > 0 ? `${hrs}h${mins}m` : `${hrs}h`;
}

function destroyCharts() {
  for (const key of Object.keys(charts)) {
    if (charts[key]) { charts[key].destroy(); delete charts[key]; }
  }
}

function renderPage(page) {
  const main = document.getElementById('main-content');
  switch (page) {
    case 'dashboard': renderDashboard(main); break;
    case 'records': renderRecords(main); break;
    case 'categories': renderCategories(main); break;
    case 'monthly': renderMonthly(main); break;
    case 'matrix': renderMatrix(main); break;
    case 'settings': renderSettings(main); break;
  }
}

// ===== RECORDS =====
function renderRecords(main) {
  const records = getAllRecords();
  const categories = [...new Set(records.map(r => r.category))];
  const dates = [...new Set(records.map(r => r.date))].sort().reverse();

  main.innerHTML = `
    <h2>📋 每日记录</h2>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px;">
      <div class="filters">
        <select id="filter-month"><option value="">全部月份</option>${[...new Set(records.map(r => r.date.split('.').slice(0,2).join('.')))].sort(cmpDate).reverse().map(m => `<option value="${m}">${m}</option>`).join('')}</select>
        <select id="filter-category"><option value="">全部分类</option>${categories.map(c => `<option value="${c}">${c}</option>`).join('')}</select>
        <input type="text" id="filter-search" placeholder="搜索活动..." style="width:180px;">
      </div>
      <button class="btn btn-primary" onclick="showAddModal()">+ 添加记录</button>
      <button class="btn btn-outline" onclick="exportCSV()" title="导出所有记录为CSV（可用Excel打开）">📥 CSV</button>
      <button class="btn btn-outline" onclick="exportJSON()" title="导出所有记录为JSON">📥 JSON</button>
    </div>
    <div id="records-list"></div>
  `;

  let _groupedCache = {};

  function renderTable() {
    const m = document.getElementById('filter-month').value;
    const c = document.getElementById('filter-category').value;
    const s = document.getElementById('filter-search').value.toLowerCase();
    let filtered = records;
    if (m) filtered = filtered.filter(r => r.date.startsWith(m + '.'));
    if (c) filtered = filtered.filter(r => r.category === c);
    if (s) filtered = filtered.filter(r => r.activity.toLowerCase().includes(s) || r.location.toLowerCase().includes(s));

    const grouped = {};
    for (const r of filtered) {
      if (!grouped[r.date]) grouped[r.date] = [];
      grouped[r.date].push(r);
    }
    // Sort items within each date group by activity for consistent indexing
    for (const d of Object.keys(grouped)) {
      grouped[d].sort((a, b) => a.activity.localeCompare(b.activity));
    }
    _groupedCache = grouped;
    const sortedDates = Object.keys(grouped).sort(cmpDate).reverse();

    let html = '';
    for (const date of sortedDates) {
      const items = grouped[date];
      const dayTotal = items.reduce((s, r) => s + r.hours, 0);
      const [, year, month, day] = date.match(/(\d{4})\.(\d+)\.(\d+)/) || [];
      const dayOfWeek = ['日','一','二','三','四','五','六'][new Date(parseInt(year), parseInt(month)-1, parseInt(day)).getDay()];
      html += '<div style="background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#fafafa;border-bottom:1px solid var(--border);font-weight:600;font-size:15px;">' +
          date + ' 周' + dayOfWeek +
          '<span style="font-weight:400;color:var(--text-secondary);font-size:13px;">合计 ' + formatHours(dayTotal) + '</span>' +
        '</div><div class="table-scroll"><table style="margin:0;min-width:500px;"><tbody>';
      for (let i = 0; i < items.length; i++) {
        const r = items[i];
        html += '<tr>' +
          '<td style="width:36%;">' + r.activity + '</td>' +
          '<td style="width:16%;"><span class="category-tag cat-' + r.category + '">' + (CAT_ICONS[r.category]||'') + ' ' + r.category + '</span></td>' +
          '<td style="width:16%;">' + r.location + '</td>' +
          '<td style="width:16%;font-weight:600;">' + formatHours(r.hours) + '</td>' +
          '<td style="width:16%;text-align:right;">' +
            '<button class="btn btn-sm btn-outline rec-edit" data-idx="' + i + '" data-date="' + date + '">✏️</button> ' +
            '<button class="btn btn-sm btn-danger rec-del" data-idx="' + i + '" data-date="' + date + '">🗑</button>' +
          '</td></tr>';
      }
      html += '</tbody></table></div></div>';
    }
    document.getElementById('records-list').innerHTML = html || '<div class="empty-state">暂无记录</div>';
  }

  document.getElementById('filter-month').addEventListener('change', renderTable);
  document.getElementById('filter-category').addEventListener('change', renderTable);
  document.getElementById('filter-search').addEventListener('input', renderTable);

  document.getElementById('records-list').addEventListener('click', function(e) {
    const btn = e.target.closest('button');
    if (!btn) return;
    const date = btn.dataset.date;
    const idx = parseInt(btn.dataset.idx);
    const rec = _groupedCache[date] && _groupedCache[date][idx];
    if (!rec) return;
    if (btn.classList.contains('rec-edit')) {
      editRecord(rec.date, rec.activity, rec.category);
    } else if (btn.classList.contains('rec-del')) {
      deleteRecord(rec.date, rec.activity, rec.category);
    }
  });

  renderTable();
}

// ===== CATEGORIES =====
function renderCategories(main) {
  const months = getMonthlyRecords();
  const monthKeys = Object.keys(months).sort(cmpDate);
  const latestMonth = monthKeys[monthKeys.length - 1];

  main.innerHTML = `
    <h2>🔖 分类分析</h2>
    <div class="filters" style="margin-bottom:20px;">
      <select id="cat-month"><option value="all">全部月份</option>${monthKeys.sort(cmpDate).reverse().map(m => `<option value="${m}" ${m===latestMonth?'selected':''}>${m}</option>`).join('')}</select>
    </div>
    <div id="cat-content"></div>
  `;

  function render() {
    const selMonth = document.getElementById('cat-month').value;
    const allRecords = getAllRecords();
    const records = selMonth === 'all' ? allRecords : allRecords.filter(r => r.date.startsWith(selMonth + '.'));
    const days = new Set(records.map(r => r.date)).size;

    const catStats = {};
    for (const r of records) {
      if (!catStats[r.category]) catStats[r.category] = { hours: 0, activities: new Set(), locations: new Set() };
      catStats[r.category].hours += r.hours;
      catStats[r.category].activities.add(r.activity);
      catStats[r.category].locations.add(r.location);
    }

    const sorted = Object.entries(catStats).sort((a, b) => b[1].hours - a[1].hours);
    const totalHours = sorted.reduce((s, [, v]) => s + v.hours, 0);
    const maxPct = sorted.length > 0 ? sorted[0][1].hours / totalHours * 100 : 0;

    let html = '<div class="charts-row"><div class="chart-card"><h3>分类时间占比 (' + (selMonth === 'all' ? '全部' : selMonth) + ')</h3><div class="chart-wrap"><canvas id="chart-cat-pie"></canvas></div></div>';
    html += '<div class="chart-card"><h3>分类量化指标</h3>';
    html += '<div style="display:flex;flex-direction:column;gap:12px;">';

    for (const [cat, stats] of sorted) {
      const pct = totalHours > 0 ? (stats.hours / totalHours * 100).toFixed(1) : 0;
      const dailyAvg = days > 0 ? (stats.hours / days).toFixed(1) : 0;
      const barW = totalHours > 0 ? (stats.hours / totalHours * 100) : 0;
      html += '<div>' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">' +
          '<span style="font-weight:600;font-size:16px;">' + (CAT_ICONS[cat]||'') + ' ' + cat + '</span>' +
          '<span style="font-size:16px;font-weight:700;">' + formatHours(stats.hours) + ' <span style="font-size:13px;color:var(--text-secondary);font-weight:400;">(' + pct + '%)</span></span>' +
        '</div>' +
        '<div style="background:#e5e7eb;border-radius:4px;height:8px;overflow:hidden;">' +
          '<div style="background:' + (CAT_COLORS[cat]||'#9ca3af') + ';height:100%;width:' + barW + '%;border-radius:4px;transition:width .3s;"></div>' +
        '</div>' +
        '<div style="display:flex;justify-content:space-between;margin-top:4px;font-size:13px;color:var(--text-secondary);">' +
          '<span>' + stats.activities.size + ' 项活动 · ' + stats.locations.size + ' 个地点</span>' +
          '<span>日均 ' + formatHours(parseFloat(dailyAvg)) + ' · 占比 ' + pct + '%</span>' +
        '</div>' +
      '</div>';
    }

    html += '</div></div></div>';

    // Activity breakdown - full width
    html += '<div class="chart-card" style="margin-top:16px;"><h3>各分类活动明细</h3>';
    html += '<div class="cat-grid-mobile" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;max-height:500px;overflow-y:auto;">';
    for (const [cat, stats] of sorted) {
      const actHours = {};
      for (const r of records.filter(r => r.category === cat)) {
        actHours[r.activity] = (actHours[r.activity] || 0) + r.hours;
      }
      const topActs = Object.entries(actHours).sort((a, b) => b[1] - a[1]).slice(0, 10);
      const maxH = topActs.length > 0 ? topActs[0][1] : 1;
      html += '<div style="background:#fafafa;border-radius:8px;padding:14px;border-left:3px solid ' + (CAT_COLORS[cat]||'#9ca3af') + ';">' +
        '<div style="font-weight:600;font-size:16px;margin-bottom:10px;">' + (CAT_ICONS[cat]||'') + ' ' + cat + ' · ' + formatHours(stats.hours) + '</div>';
      for (const [act, h] of topActs) {
        const actPct = (h / stats.hours * 100).toFixed(0);
        html += '<div style="margin-bottom:6px;">' +
          '<div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:2px;"><span>' + act + '</span><span style="font-weight:500;">' + formatHours(h) + ' (' + actPct + '%)</span></div>' +
          '<div style="background:#e5e7eb;border-radius:3px;height:4px;overflow:hidden;">' +
            '<div style="background:' + (CAT_COLORS[cat]||'#9ca3af') + ';height:100%;width:' + (h/maxH*100) + '%;border-radius:3px;opacity:.5;"></div>' +
          '</div>' +
        '</div>';
      }
      html += '</div>';
    }
    html += '</div></div>';

    document.getElementById('cat-content').innerHTML = html;

    // Pie chart
    const ctx = document.getElementById('chart-cat-pie').getContext('2d');
    charts['cat-pie'] = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: sorted.map(([c]) => c),
        datasets: [{ data: sorted.map(([, s]) => s.hours), backgroundColor: sorted.map(([c]) => CAT_COLORS[c]||'#9ca3af'), borderWidth: 2, borderColor: '#fff' }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        layout: { padding: { bottom: 8 } },
        plugins: {
          legend: { position: 'bottom', labels: { padding: 14, usePointStyle: true, font: { size: 12 }, boxWidth: 10 } },
          datalabels: {
            color: '#fff', font: { weight: 'bold', size: 12 },
            formatter: (v, ctx) => { const sum = ctx.dataset.data.reduce((a,b)=>a+b,0); const pct = sum>0 ? Math.round(v/sum*100) : 0; return pct >= 5 ? pct + '%' : ''; }
          }
        }
      }
    });
  }

  document.getElementById('cat-month').addEventListener('change', () => { destroyCharts(); render(); });
  render();
}

// ===== MONTHLY COMPARISON =====
function renderMonthly(main) {
  const months = getMonthlyRecords();
  const monthKeys = Object.keys(months).sort(cmpDate);
  const allCats = [...new Set(getAllRecords().map(r => r.category))];

  let html = '<h2>📅 月度对比</h2>';

  // Summary table
  html += '<div class="chart-card" style="margin-bottom:16px;"><h3>各月总览</h3><div class="table-scroll"><table><thead><tr><th>月份</th><th>天数</th><th>条数</th><th>总时间</th><th>日均</th>';
  for (const cat of allCats) html += `<th>${cat}</th>`;
  html += '</tr></thead><tbody>';

  for (const m of monthKeys) {
    const recs = months[m];
    const days = new Set(recs.map(r => r.date)).size;
    const total = recs.reduce((s, r) => s + r.hours, 0);
    const dayAvg = total / days;
    html += '<tr><td style="font-weight:600;">' + m + '</td><td>' + days + '</td><td>' + recs.length + '</td><td>' + formatHours(total) + '</td><td>' + formatHours(dayAvg) + '</td>';
    for (const cat of allCats) {
      const h = recs.filter(r => r.category === cat).reduce((s, r) => s + r.hours, 0);
      const pct = total > 0 ? (h / total * 100).toFixed(1) : 0;
      html += '<td>' + (h > 0 ? formatHours(h) + ' <span style="font-size:12px;color:var(--text-secondary);">' + pct + '%</span>' : '-') + '</td>';
    }
    html += '</tr>';
  }
  // Add total row
  const allRecs = getAllRecords();
  const allDays = new Set(allRecs.map(r => r.date)).size;
  const allTotal = allRecs.reduce((s, r) => s + r.hours, 0);
  html += '<tr style="background:#fafafa;font-weight:700;"><td>合计</td><td>' + allDays + '</td><td>' + allRecs.length + '</td><td>' + formatHours(allTotal) + '</td><td>' + formatHours(allTotal/allDays) + '</td>';
  for (const cat of allCats) {
    const h = allRecs.filter(r => r.category === cat).reduce((s, r) => s + r.hours, 0);
    const pct = allTotal > 0 ? (h / allTotal * 100).toFixed(1) : 0;
    html += '<td>' + formatHours(h) + ' <span style="font-size:12px;font-weight:400;">' + pct + '%</span></td>';
  }
  html += '</tr>';
  html += '</tbody></table></div></div>';

  // Bar chart comparison
  html += '<div class="charts-row"><div class="chart-card full"><h3>月度分类对比</h3><div class="chart-wrap tall"><canvas id="chart-monthly-bar"></canvas></div></div></div>';

  // Trend
  html += '<div class="chart-card" style="margin-top:16px;"><h3>各类别月度趋势</h3><div class="chart-wrap" style="height:350px;"><canvas id="chart-cat-trend"></canvas></div></div>';

  main.innerHTML = html;

  // Horizontal stacked bar chart
  const ctx1 = document.getElementById('chart-monthly-bar').getContext('2d');
  charts['monthly-bar'] = new Chart(ctx1, {
    type: 'bar',
    data: {
      labels: monthKeys,
      datasets: allCats.map(cat => ({
        label: cat,
        data: monthKeys.map(m => months[m].filter(r => r.category === cat).reduce((s, r) => s + r.hours, 0)),
        backgroundColor: CAT_COLORS[cat] || '#9ca3af'
      }))
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { bottom: 8 } },
      plugins: { legend: { position: 'bottom', labels: { padding: 14, usePointStyle: true, font: { size: 12 }, boxWidth: 10 } } },
      scales: { x: { stacked: true, title: { display: true, text: '小时' } }, y: { stacked: true } }
    }
  });

  // Category trend
  const ctx2 = document.getElementById('chart-cat-trend').getContext('2d');
  charts['cat-trend'] = new Chart(ctx2, {
    type: 'line',
    data: {
      labels: monthKeys,
      datasets: allCats.map(cat => ({
        label: cat,
        data: monthKeys.map(m => months[m].filter(r => r.category === cat).reduce((s, r) => s + r.hours, 0)),
        borderColor: CAT_COLORS[cat] || '#9ca3af',
        backgroundColor: 'transparent', tension: .3, pointRadius: 4
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { padding: 12, usePointStyle: true } } },
      scales: { y: { title: { display: true, text: '小时' } } }
    }
  });
}

// ===== EISENHOWER MATRIX =====
function loadMatrixTasks() {
  const saved = JSON.parse(localStorage.getItem('lyu_matrix') || 'null');
  if (saved) return saved;
  // First load: merge embedded + user tasks
  const embedded = (EMBEDDED_DATA.matrix || []).map(t => ({
    id: 'emb_' + Math.random().toString(36).slice(2, 8),
    quadrant: classifyMatrix(t.urgency, t.importance),
    task: t.task,
    detail: t.details || '',
    deadline: t.deadline || '',
    note: t.notes || ''
  }));
  localStorage.setItem('lyu_matrix', JSON.stringify(embedded));
  return embedded;
}
function saveMatrixTasks(tasks) { localStorage.setItem('lyu_matrix', JSON.stringify(tasks)); }
function classifyMatrix(urgency, importance) {
  const u = (urgency || '').includes('紧急');
  const i = (importance || '').includes('重要');
  if (u && i) return 'q1';
  if (!u && i) return 'q2';
  if (u && !i) return 'q3';
  return 'q4';
}

function renderMatrix(main) {
  const quadrants = {

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;'); }

window.saveEdit = function() {
  if (!_editOrig) return;
  const date = fromDateInput(document.getElementById('edit-date').value);
  const activity = document.getElementById('edit-activity').value.trim();
  const category = document.getElementById('edit-category').value;
  const location = document.getElementById('edit-location').value.trim();
  const hours = parseFloat(document.getElementById('edit-hours').value);
  if (!date || !activity || !hours) { alert('请填写日期、活动和时长'); return; }

  const { date: oDate, activity: oAct, category: oCat } = _editOrig;
  let saved = JSON.parse(localStorage.getItem('lyu_records') || '[]');
  const embKey = oDate + '|' + oAct + '|' + oCat;
  let isEmbedded = false;
  for (const m of Object.keys(EMBEDDED_DATA.months)) {
    if (EMBEDDED_DATA.months[m].some(r => r.date + '|' + r.activity + '|' + r.category === embKey)) {
      isEmbedded = true; break;
    }
  }
  if (isEmbedded) {
    saved.push({ date, activity, category, location, hours, _overrides: embKey });
  } else {
    const idx = saved.findIndex(r => r.date === oDate && r.activity === oAct && r.category === oCat);
    if (idx >= 0) saved[idx] = { date, activity, category, location, hours };
  }
  localStorage.setItem('lyu_records', JSON.stringify(saved));
  _editOrig = null;
  closeModal();
  afterLocalSave();
  renderPage('records');
};

window.deleteRecord = function(date, activity, category) {
  if (!confirm(`确定删除 "${activity}"?`)) return;
  const embKey = date + '|' + activity + '|' + category;
  let isEmbedded = false;
  for (const m of Object.keys(EMBEDDED_DATA.months)) {
    if (EMBEDDED_DATA.months[m].some(r => r.date + '|' + r.activity + '|' + r.category === embKey)) {
      isEmbedded = true; break;
    }
  }
  let saved = JSON.parse(localStorage.getItem('lyu_records') || '[]');
  if (isEmbedded) {
    saved.push({ _deleted: embKey });
  } else {
    saved = saved.filter(r => !(r.date === date && r.activity === activity && r.category === category));
  }
  localStorage.setItem('lyu_records', JSON.stringify(saved));
  afterLocalSave();
  renderPage('records');
};

};

// ===== EXPORT =====
function downloadFile(filename, content, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

window.exportCSV = function() {
  const records = getAllRecords();
  if (records.length === 0) { alert('没有记录可导出'); return; }
  const BOM = '﻿';
  const header = '日期,地点,活动,分类,时长(h)';
  const rows = records.map(r => [r.date, `"${(r.location||'').replace(/"/g,'""')}"`, `"${r.activity.replace(/"/g,'""')}"`, r.category, r.hours].join(','));
  downloadFile('时间记录.csv', BOM + header + '\n' + rows.join('\n'), 'text/csv;charset=utf-8');
};

window.exportJSON = function() {
  const records = getAllRecords();
  if (records.length === 0) { alert('没有记录可导出'); return; }
  downloadFile('时间记录.json', JSON.stringify(records, null, 2), 'application/json');
};

window.exportSummaryCSV = function() {
  const months = getMonthlyRecords();
  const monthKeys = Object.keys(months).sort(cmpDate);
  const allCats = [...new Set(getAllRecords().map(r => r.category))];
  if (monthKeys.length === 0) { alert('没有数据可导出'); return; }
  const BOM = '﻿';
  const header = '月份,记录天数,总时间(h),日均(h),' + allCats.join(',');
  const rows = monthKeys.map(m => {
    const recs = months[m];
    const days = new Set(recs.map(r => r.date)).size;
    const total = recs.reduce((s, r) => s + r.hours, 0);
    const dayAvg = total / days;
    const catHours = allCats.map(c => recs.filter(r => r.category === c).reduce((s, r) => s + r.hours, 0).toFixed(1));
    return [m, days, total.toFixed(1), dayAvg.toFixed(1), ...catHours].join(',');
  });
  downloadFile('月度汇总.csv', BOM + header + '\n' + rows.join('\n'), 'text/csv;charset=utf-8');
};

function getMonthlyRecords() {
  const records = getAllRecords();
  const months = {};
  for (const r of records) {
    const m = r.date.split('.').slice(0, 2).join('.');
    if (!months[m]) months[m] = [];
    months[m].push(r);
  }
  return months;
}

function formatHours(h) {
  const hrs = Math.floor(h);
  const mins = Math.round((h - hrs) * 60);
  return mins > 0 ? `${hrs}h${mins}m` : `${hrs}h`;
}
